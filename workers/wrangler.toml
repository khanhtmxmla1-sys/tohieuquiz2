# iTongQuiz Workers API Configuration
# Secrets defined in 'wrangler secret put':
# - API_SECRET_TOKEN: Shared secret for API auth

name = "itongquiz-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = false
migrations_dir = "./migrations"

[[d1_databases]]
binding = "DB"
database_name = "thtohieu"
database_id = "596a4ef0-2f2f-4c94-957e-51cd441bc5cc"

[vars]
CLIPROXY_API = "https://api.thitong.site/v1"

# Cron triggers
[triggers]
crons = [
    "0 0 * * 1",  # Every Monday at 00:00 UTC (7:00 AM ICT) - Weekly leaderboard rewards
    "* * * * *"   # Every minute - Auto-close expired live exams
]
