<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="32" cy="32" r="30" fill="url(#skyGrad)"/>
  <!-- Globe Lines -->
  <ellipse cx="32" cy="32" rx="20" ry="20" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <ellipse cx="32" cy="32" rx="10" ry="20" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="12" y1="32" x2="52" y2="32" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <line x1="32" y1="12" x2="32" y2="52" stroke="white" stroke-width="1.5" opacity="0.5"/>
  <!-- Star Badge -->
  <circle cx="48" cy="16" r="10" fill="url(#goldGrad)"/>
  <text x="48" y="20" text-anchor="middle" fill="white" font-size="12" font-weight="bold">★</text>
</svg>
